name: Bug Report
description: Report a reproducible defect in the template, apps, packages, or automation.
title: 'bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the template. Do not include secrets, tokens, database URLs, private customer data, or exploit details in public issues.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken and what impact does it have?
      placeholder: The admin smoke test fails when...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - apps/web
        - apps/web-admin
        - apps/backend
        - apps/backend-admin
        - packages/config
        - packages/hooks
        - packages/i18n
        - packages/iam
        - packages/prisma
        - packages/schema
        - packages/ui
        - test/automation
        - docs/tooling
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Provide the smallest reproducible sequence.
      placeholder: |
        1. Run `pnpm install`
        2. Run `pnpm check`
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Commands And Output
      description: Include relevant command output. Redact sensitive values.
      placeholder: |
        `pnpm test:affected`
        ...
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, browser if relevant.
      placeholder: macOS 15, Node 24.11.0, pnpm 10.20.0
